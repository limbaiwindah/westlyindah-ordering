<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Market Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-lg">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Fresh Market Order</h2>
        
        <form id="orderForm">
            <div class="mb-4">
                <label class="block text-gray-700">Your Name</label>
                <input type="text" id="name" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="mb-4">
                <label class="block text-gray-700">Product</label>
                <select id="product" class="w-full px-3 py-2 border rounded-lg">
                    <option value="Fresh Tofu">Fresh Tofu</option>
                    <option value="Whole Chicken">Whole Chicken</option>
                </select>
            </div>

            <div class="mb-6">
                <label class="block text-gray-700">Quantity (pcs/kg)</label>
                <input type="number" id="quantity" value="1" min="1" class="w-full px-3 py-2 border rounded-lg">
            </div>

            <button type="submit" class="w-full bg-green-500 text-white font-bold py-2 rounded-lg hover:bg-green-600 transition">
                Submit Order
            </button>
        </form>
    </div>

    <script>
        // We will add the logic here in Step 2
    </script>
</body>
</html>
