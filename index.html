<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WestlyIndah Ordering</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 border border-slate-100">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-green-700">WestlyIndah Ordering</h1>
            <p class="text-sm text-slate-500 font-medium">Sila isi pesanan anda di bawah</p>
        </div>

        <form id="orderForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Nama Pelanggan</label>
                <input type="text" id="name" required placeholder="Nama anda..." 
                    class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Pesanan (Contoh: 3kg ayam, 2 bungkus mee)</label>
                <textarea id="orderItems" rows="5" required placeholder="Tulis senarai barang di sini..." 
                    class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition"></textarea>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Arahan Khas / Alamat</label>
                <input type="text" id="details" placeholder="Hantar ke rumah / Pickup pukul 10" 
                    class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Pilih Hari Tempahan:</label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="flex items-center justify-center p-3 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:bg-green-50 transition">
                        <input type="radio" name="orderDate" value="Selasa" required class="mr-2 accent-green-600">
                        <span class="text-slate-700 font-medium">Selasa</span>
                    </label>
                    <label class="flex items-center justify-center p-3 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:bg-green-50 transition">
                        <input type="radio" name="orderDate" value="Rabu" required class="mr-2 accent-green-600">
                        <span class="text-slate-700 font-medium">Rabu</span>
                    </label>
                </div>
            </div>

            <button type="submit" id="submitBtn" 
                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg transition duration-200 text-lg">
                Hantar Tempahan (WhatsApp)
            </button>
        </form>
        
        <p class="text-center text-[10px] text-slate-400 mt-6 tracking-widest uppercase">WestlyIndah IT Solutions</p>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwfxU-fVV5RpyVCWwWI8lKPx5nJzRWHorWojN1YjENz6O3KGVIQ-YZQNlDJyeFc1rugcA/exec'; 
        const phoneNumber = '601125126987'; 
    
        const form = document.getElementById('orderForm');
        const btn = document.getElementById('submitBtn');
    
        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Sila tunggu...";
    
            const payload = {
                name: document.getElementById('name').value,
                order: document.getElementById('orderItems').value,
                details: document.getElementById('details').value,
                // Grabs whichever radio button (Selasa or Rabu) is picked
                date: document.querySelector('input[name="orderDate"]:checked').value
            };
    
            fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) })
                .then(() => {
                    const now = new Date().toLocaleString('ms-MY');
                    const msg = `*TEMPAPAN BARU (SISTEM)*\n` +
                                `--------------------------\n` +
                                `*Nama:* ${payload.name}\n` +
                                `*Hari:* ${payload.date}\n` +
                                `*Pesanan:*\n${payload.order}\n\n` +
                                `*Nota:* ${payload.details || '-'}\n` +
                                `--------------------------\n` +
                                `✅ _Rekod Sistem: ${now}_`;
                    
                    window.location.href = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(msg)}`;
                })
                .catch(error => {
                    alert('Ralat! Sila cuba lagi.');
                    btn.disabled = false;
                    btn.innerText = "Hantar Lagi";
                });
        });
    </script>
</body>
</html>
